<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Outlook Guided Resolution</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
:root {
  --bg:#f4f8ff;
  --card:#fff;
  --primary:#2563eb;
  --success:#16a34a;
  --text:#1e293b;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:20px;
  color:#fff;
  cursor:pointer;
}

.btn-primary{background:#2563eb;}
.btn-success{background:#16a34a;}
.btn-back{background:#64748b;}

.search-results{
  background:#fff;
  border:1px solid #ccc;
  display:none;
  position:absolute;
  width:100%;
  max-height:200px;
  overflow:auto;
}

.search-results.visible{display:block;}

.issue-card{
  background:#eef5ff;
  padding:8px;
  border-radius:10px;
  margin:4px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Outlook Guided Resolution</h1>

<div class="card">
<input id="excelFile" type="file"/>
</div>

<div class="card">
<input id="issueSearch" placeholder="Search issues..."/>
<ul id="searchResults" class="search-results"></ul>

<select id="issueSelect"></select>
</div>

<div class="card">
<h2 id="issueTitleDisplay"></h2>
<div id="stepNav"></div>
</div>

<div class="card">
<h3 id="stepTitle"></h3>
<div id="stepInstruction"></div>

<button id="btnResolved" class="btn-success">Resolved</button>
<button id="btnContinue" class="btn-primary">Continue</button>
<button id="btnBack" class="btn-back">Back</button>
</div>

<div class="card">
<textarea id="summaryText"></textarea>
<button id="btnCopySummary">Copy Summary</button>
</div>

</div>

<script>

let tree={},currentIssue="",currentStepNo=null,visitedSteps=[];

const el={
excelFile:document.getElementById("excelFile"),
issueSearch:document.getElementById("issueSearch"),
searchResults:document.getElementById("searchResults"),
issueSelect:document.getElementById("issueSelect"),
issueTitleDisplay:document.getElementById("issueTitleDisplay"),
stepTitle:document.getElementById("stepTitle"),
stepInstruction:document.getElementById("stepInstruction"),
summaryText:document.getElementById("summaryText")
};

function buildTree(rows){
  const map={};

  rows.forEach(r=>{
    const issue=r.Issue;
    const stepNo=Number(r["Step No"]);
    if(!issue||!stepNo)return;

    if(!map[issue])map[issue]={steps:{},order:[]};

    map[issue].steps[stepNo]={
      stepNo,
      title:r.Title,
      instruction:r.Instruction,
      nextStep:Number(r["Next Step"]),
      escalate:r.Escalate==="Yes"
    };
  });

  Object.keys(map).forEach(i=>{
    map[i].order=Object.keys(map[i].steps).map(Number).sort((a,b)=>a-b);
  });

  return map;
}

function renderIssueList(){
  el.issueSelect.innerHTML="";
  Object.keys(tree).forEach(issue=>{
    const o=document.createElement("option");
    o.value=issue;
    o.textContent=issue;
    el.issueSelect.appendChild(o);
  });
}

function startIssue(issue){
  currentIssue=issue;
  currentStepNo=tree[issue].order[0];
  visitedSteps=[currentStepNo];
  render();
}

function render(){
  const step=tree[currentIssue].steps[currentStepNo];
  el.issueTitleDisplay.textContent=currentIssue;
  el.stepTitle.textContent=step.title;
  el.stepInstruction.textContent=step.instruction;

  el.summaryText.value=`Issue: ${currentIssue}\nSteps: ${visitedSteps.join(",")}`;
}

document.getElementById("btnContinue").onclick=()=>{
  const step=tree[currentIssue].steps[currentStepNo];
  if(step.nextStep){
    currentStepNo=step.nextStep;
    visitedSteps.push(currentStepNo);
    render();
  }
};

el.issueSearch.oninput=()=>{
  const q=el.issueSearch.value.toLowerCase();
  el.searchResults.innerHTML="";
  Object.keys(tree).filter(i=>i.toLowerCase().includes(q)).forEach(i=>{
    const li=document.createElement("li");
    li.textContent=i;
    li.onclick=()=>startIssue(i);
    el.searchResults.appendChild(li);
  });
  el.searchResults.classList.add("visible");
};

el.issueSelect.onchange=e=>startIssue(e.target.value);

el.excelFile.onchange=async(e)=>{
  const data=await e.target.files[0].arrayBuffer();
  const wb=XLSX.read(data);
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws);
  tree=buildTree(rows);
  renderIssueList();
};

</script>

</body>
</html>
