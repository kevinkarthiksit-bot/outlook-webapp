<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M365 Outlook Guided Resolution</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body {
  margin:0;
  font-family:"Segoe UI";
  background:#f4f8ff;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card {
  background:white;
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h1 {color:#1e40af;}

input,select,textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #cbd5e1;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:20px;
  color:white;
  cursor:pointer;
  margin:4px;
  transition:0.2s;
}

button:hover {transform:translateY(-1px);}
button:active {transform:scale(0.95);}

.btn-primary {background:#2563eb;}
.btn-success {background:#16a34a;}
.btn-back {background:#64748b;}

.common button {
  background:#eaf3ff;
  color:#1e40af;
}

.step {
  background:#eaf3ff;
  padding:10px;
  border-radius:10px;
  margin-top:6px;
  animation:fade 0.3s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(5px);}
  to {opacity:1;}
}

.pill {
  display:inline-block;
  padding:6px 12px;
  border-radius:20px;
  background:#eff6ff;
  margin:2px;
}

.pill.active {
  background:#2563eb;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>M365 Outlook Guided Resolution</h1>

<div class="card">
<input id="file" type="file">
</div>

<div class="card">
<input id="search" placeholder="Search issues...">
<select id="issue"></select>

<div class="common">
<button onclick="quick('Outlook Not Opening')">Outlook Not Opening</button>
<button onclick="quick('Emails Not Sending')">Emails Not Sending</button>
<button onclick="quick('Emails Not Receiving')">Emails Not Receiving</button>
<button onclick="quick('Outlook Slow Performance')">Slow Performance</button>
<button onclick="quick('Authentication Prompt Loop')">Auth Loop</button>
</div>
</div>

<div class="card">
<h2 id="issueTitle"></h2>
<div id="pills"></div>
<h3 id="stepTitle"></h3>
<div id="steps"></div>
</div>

<div class="card">
<button id="continue" class="btn-primary">Continue</button>
<button id="resolved" class="btn-success">Resolved</button>
<button id="back" class="btn-back">Back</button>
</div>

<div class="card">
<textarea id="summary"></textarea>
<button id="copy">Copy Summary</button>
</div>

</div>

<script>

let tree={},issue="",stepNo=0,visited=[],status="";

function buildTree(rows){
  let map={};
  rows.forEach(r=>{
    let i=r.Issue;
    let s=Number(r["Step No"]);
    if(!i||!s)return;

    if(!map[i])map[i]={steps:{},order:[]};

    map[i].steps[s]={
      title:r.Title,
      instruction:r.Instruction,
      next:Number(r["Next Step"]),
      escalate:String(r.Escalate).toLowerCase()==="yes"
    };
  });

  Object.keys(map).forEach(i=>{
    map[i].order=Object.keys(map[i].steps).map(Number).sort((a,b)=>a-b);
  });

  return map;
}

function loadIssue(i){
  issue=i;
  stepNo=tree[i].order[0];
  visited=[stepNo];
  status="";
  render();
}

function quick(name){
  if(tree[name]) loadIssue(name);
}

function render(){
  let step=tree[issue].steps[stepNo];

  document.getElementById("issueTitle").innerText=issue;
  document.getElementById("stepTitle").innerText=step.title;

  let container=document.getElementById("steps");
  container.innerHTML="";

  step.instruction.split("\n").forEach(s=>{
    let div=document.createElement("div");
    div.className="step";
    div.innerText=s.replace("STEP:","");
    container.appendChild(div);
  });

  let pills=document.getElementById("pills");
  pills.innerHTML="";
  tree[issue].order.forEach(s=>{
    let p=document.createElement("span");
    p.className="pill"+(s===stepNo?" active":"");
    p.innerText="Step "+s;
    pills.appendChild(p);
  });

  document.getElementById("summary").value=
`Issue: ${issue}

Steps Taken:
${visited.map((s,i)=>`${i+1}. Step ${s}`).join("\n")}

Status: ${status||"In Progress"}`;
}

document.getElementById("continue").onclick=()=>{
  let step=tree[issue].steps[stepNo];
  if(step.next){
    stepNo=step.next;
    visited.push(stepNo);
    render();
  } else {
    status="Escalate to Tier 2";
    render();
  }
};

document.getElementById("resolved").onclick=()=>{
  status="Resolved";
  render();
};

document.getElementById("back").onclick=()=>{
  if(visited.length>1){
    visited.pop();
    stepNo=visited[visited.length-1];
    render();
  }
};

document.getElementById("search").oninput=(e)=>{
  let q=e.target.value.toLowerCase();
  let dropdown=document.getElementById("issue");
  dropdown.innerHTML="";
  Object.keys(tree)
    .filter(i=>i.toLowerCase().includes(q))
    .forEach(i=>{
      let o=document.createElement("option");
      o.value=i;
      o.textContent=i;
      dropdown.appendChild(o);
    });
};

document.getElementById("issue").onchange=(e)=>loadIssue(e.target.value);

document.getElementById("file").onchange=async(e)=>{
  let data=await e.target.files[0].arrayBuffer();
  let wb=XLSX.read(data);
  let ws=wb.Sheets[wb.SheetNames[0]];
  let rows=XLSX.utils.sheet_to_json(ws);

  tree=buildTree(rows);

  let dropdown=document.getElementById("issue");
  dropdown.innerHTML="";
  Object.keys(tree).forEach(i=>{
    let o=document.createElement("option");
    o.value=i;
    o.textContent=i;
    dropdown.appendChild(o);
  });
};

document.getElementById("copy").onclick=()=>{
  navigator.clipboard.writeText(document.getElementById("summary").value);
};

</script>

</body>
</html>
