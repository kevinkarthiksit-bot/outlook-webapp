<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlook Guided Resolution</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
:root {
  --bg: #eef4ff;
  --card: #ffffff;
  --primary: #2563eb;
  --primary-dark: #1e40af;
  --success: #16a34a;
  --text: #1e293b;
  --muted: #64748b;
  --border: #dbeafe;
  --shadow: 0 12px 28px rgba(37, 99, 235, 0.08);
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #f4f8ff, #eef4ff);
}

.container {
  max-width: 1100px;
  margin: 30px auto;
  display: grid;
  gap: 16px;
}

.card {
  background: var(--card);
  padding: 16px;
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

h1 { color: var(--primary-dark); margin: 0; }
.sub { color: var(--muted); font-size: 14px; }

/* COMMON ISSUES */
.common {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.common button {
  background: #eef5ff;
  color: var(--primary-dark);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 12px;
  cursor: pointer;
}

/* SEARCH */
.search-box { position: relative; }

.results {
  position: absolute;
  top: 105%;
  width: 100%;
  background: white;
  border-radius: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  display: none;
  max-height: 200px;
  overflow: auto;
}

.results div {
  padding: 8px;
  cursor: pointer;
}

.results div:hover {
  background: #eff6ff;
}

/* STEP NAV */
.nav {
  margin-top: 10px;
}

.pill {
  display: inline-block;
  background: #eff6ff;
  padding: 6px 12px;
  border-radius: 20px;
  margin-right: 6px;
  font-size: 13px;
}

.pill.active {
  background: var(--primary);
  color: white;
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 16px;
}

/* STEPS */
.step {
  background: #eaf3ff;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
  animation: fade 0.25s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(5px);}
  to {opacity:1;}
}

/* BUTTONS */
button {
  border: none;
  border-radius: 20px;
  padding: 8px 14px;
  color: white;
  cursor: pointer;
  margin-right: 6px;
}

.btn-primary { background: var(--primary); }
.btn-success { background: var(--success); }
.btn-back { background: #94a3b8; }

textarea {
  width: 100%;
  min-height: 140px;
  border-radius: 10px;
  border: 1px solid var(--border);
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Outlook Guided Resolution</h1>
<div class="sub">Upload Excel and follow troubleshooting steps</div>

<div class="common">
<button onclick="quick('Outlook Not Opening')">Outlook Not Opening</button>
<button onclick="quick('Emails Not Sending')">Emails Not Sending</button>
<button onclick="quick('Emails Not Receiving')">Emails Not Receiving</button>
<button onclick="quick('Outlook Slow Performance')">Slow Performance</button>
<button onclick="quick('Authentication Prompt Loop')">Auth Loop</button>
</div>
</div>

<div class="card">
<input type="file" id="file">

<div class="search-box">
<input id="search" placeholder="Search issues...">
<div id="results" class="results"></div>
</div>

<select id="issue"></select>
</div>

<div class="card">
<h3 id="issueTitle"></h3>
<div id="nav" class="nav"></div>
</div>

<div class="layout">

<div class="card">
<h3 id="stepTitle"></h3>
<div id="steps"></div>

<br>
<button class="btn-success" onclick="resolve()">Resolved</button>
<button class="btn-primary" onclick="next()">Continue</button>
<button class="btn-back" onclick="back()">Back</button>
</div>

<div class="card">
<textarea id="summary"></textarea>
<button onclick="copy()">Copy Summary</button>
</div>

</div>

</div>

<script>
let tree={},issue="",step=0,visited=[],status="";

function build(rows){
  let t={};
  rows.forEach(r=>{
    let i=r.Issue;
    let s=Number(r["Step No"]);
    if(!t[i]) t[i]={steps:{},order:[]};
    t[i].steps[s]={
      title:r.Title,
      instruction:r.Instruction,
      next:Number(r["Next Step"]),
      escalate:r.Escalate==="Yes"
    };
  });
  Object.keys(t).forEach(i=>{
    t[i].order=Object.keys(t[i].steps).map(Number).sort((a,b)=>a-b);
  });
  return t;
}

function load(i){
  issue=i;
  step=tree[i].order[0];
  visited=[step];
  status="";
  render();
}

function quick(i){ if(tree[i]) load(i); }

function render(){
  let s=tree[issue].steps[step];
  document.getElementById("issueTitle").innerText=issue;
  document.getElementById("stepTitle").innerText="Step "+step+": "+s.title;

  let div=document.getElementById("steps");
  div.innerHTML="";
  s.instruction.split("\n").forEach(t=>{
    let d=document.createElement("div");
    d.className="step";
    d.innerText=t.replace("STEP:","");
    div.appendChild(d);
  });

  let nav=document.getElementById("nav");
  nav.innerHTML="";
  tree[issue].order.forEach(n=>{
    let p=document.createElement("span");
    p.className="pill"+(n===step?" active":"");
    p.innerText="Step "+n;
    nav.appendChild(p);
  });

  document.getElementById("summary").value=
`Issue: ${issue}

Steps Taken:
${visited.map((s,i)=>`${i+1}. Step ${s}`).join("\n")}

Status: ${status||"In Progress"}`;
}

function next(){
  let s=tree[issue].steps[step];
  if(s.next){
    step=s.next;
    visited.push(step);
  } else {
    status="Escalate to Tier 2";
  }
  render();
}

function resolve(){
  status="Resolved";
  render();
}

function back(){
  if(visited.length>1){
    visited.pop();
    step=visited[visited.length-1];
    render();
  }
}

function copy(){
  navigator.clipboard.writeText(document.getElementById("summary").value);
}

document.getElementById("file").onchange=async e=>{
  let data=await e.target.files[0].arrayBuffer();
  let wb=XLSX.read(data);
  let ws=wb.Sheets[wb.SheetNames[0]];
  let rows=XLSX.utils.sheet_to_json(ws);
  tree=build(rows);

  let sel=document.getElementById("issue");
  sel.innerHTML="";
  Object.keys(tree).forEach(i=>{
    let o=document.createElement("option");
    o.value=i;
    o.textContent=i;
    sel.appendChild(o);
  });
};

document.getElementById("issue").onchange=e=>load(e.target.value);

document.getElementById("search").oninput=e=>{
  let q=e.target.value.toLowerCase();
  let res=document.getElementById("results");
  res.innerHTML="";
  if(!q){res.style.display="none";return;}
  Object.keys(tree).filter(i=>i.toLowerCase().includes(q)).forEach(i=>{
    let d=document.createElement("div");
    d.innerText=i;
    d.onclick=()=>{load(i);res.style.display="none";}
    res.appendChild(d);
  });
  res.style.display="block";
};
</script>

</body>
</html>
